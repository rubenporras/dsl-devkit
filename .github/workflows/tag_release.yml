name: tag_release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to tag'
        required: false
        default: master
        type: string
      version_bump:
        description: 'Version component to bump'
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST → $NEW_TAG"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Summary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.server_url }}/${{ github.repository }}"
          echo "::notice::Created tag $TAG on branch ${{ inputs.branch }}"
          {
            echo "## Release tag created"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Tag** | [$TAG]($REPO/releases/tag/$TAG) |"
            echo "| **Branch** | \`${{ inputs.branch }}\` |"
            echo "| **Bump** | \`${{ inputs.version_bump }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
